name: 'vinanalytics'
version: '1.0.0'
config-version: 2

# Perfil de conexión (ver profiles.yml en esta misma carpeta).
profile: 'vinanalytics'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ──────────────────────────────────────────────────────────────────────────────
# Transformación declarativa CU-O03 + agregaciones de serving (Princ. VI).
#   staging/ → vistas ligeras sobre las tablas StarRocks ya cargadas (sources).
#   marts/   → modelo Fact-Dim curado y testeado (materializado como table).
#   serving/ → AGREGACIONES del dashboard/API/reporte (CU-O16), declarativas.
#              Antes vivían como SQL imperativo en clickhouse/populate.py y
#              duplicado en app.py; ahora son la ÚNICA fuente de la lógica de
#              agregación. clickhouse/populate.py solo TRANSPORTA estas vistas a
#              ClickHouse y app.py/serving.py solo LEEN (sin recalcular).
#              Materializadas como `view`: siempre frescas, sin clave/distribución.
# Los nombres NO colisionan con las tablas existentes (fct_*, dim_*_vino, agg_*).
# ──────────────────────────────────────────────────────────────────────────────
models:
  vinanalytics:
    staging:
      +materialized: view
    marts:
      +materialized: table
    serving:
      +materialized: view
